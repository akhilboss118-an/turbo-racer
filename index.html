<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turbo Racer — Feel the Speed. Command the Road.</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://unpkg.com/zustand@4.4.1/esm/index.mjs" type="module"></script>

</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anybody:ital,wght@0,400;0,700;0,800;1,700;1,800&family=Hanken+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f; --bg-dim: #050508; --surface: #1a1a24;
  --on-surface: #e5e2e1; --on-surface-dim: rgba(229,226,225,0.5);
  --primary: #FF4500; --secondary: #00E5FF; --accent: #FF00FF;
  --green: #00FF88; --gold: #FFD700;
  --primary-glow: rgba(255,69,0,0.3); --cyan-glow: rgba(0,229,255,0.3);
  --font-display: 'Anybody', sans-serif;
  --font-body: 'Hanken Grotesk', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body); background: var(--bg-dim);
  color: var(--on-surface); overflow-x: hidden;
}
#loading-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg-dim);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#loading-screen.hidden { opacity: 0; visibility: hidden; }
.wheel-wrap {
  width: 180px; height: 180px; border-radius: 50%;
  position: relative;
  background: radial-gradient(circle at center, #12121e 30%, #0a0a0f 100%);
  box-shadow: 0 0 60px rgba(255,69,0,0.12), inset 0 0 40px rgba(0,0,0,0.5);
  overflow: hidden;
}
.wheel-svg {
  width: 100%; height: 100%;
  animation: wheel-spin 1.2s linear infinite;
  filter: drop-shadow(0 0 6px rgba(255,69,0,0.2));
}
@keyframes wheel-spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.wheel-progress {
  position: absolute; bottom: 0; left: 0; width: 100%; height: 0%;
  background: linear-gradient(to top, rgba(255,69,0,0.3), rgba(255,69,0,0.05));
  transition: height 0.3s ease;
  border-radius: 0 0 50% 50% / 0 0 100% 100%;
}
.wheel-text {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 22px; font-weight: 600;
  color: #FF4500; text-shadow: 0 0 16px rgba(255,69,0,0.6);
  z-index: 2;
}
.loading-label {
  font-family: var(--font-display); font-size: 14px;
  letter-spacing: 6px; text-transform: uppercase;
  margin-top: 28px; color: var(--secondary);
  font-style: italic;
}
.loading-sub {
  font-family: var(--font-mono); font-size: 10px;
  color: rgba(229,226,225,0.3); margin-top: 8px;
  letter-spacing: 2px;
}
.canvas-wrap {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh; z-index: 1;
  pointer-events: none;
}
.canvas-wrap::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
}
.dof-overlay {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh; z-index: 2;
  pointer-events: none;
  transition: backdrop-filter 0.5s ease;
}
.content { position: relative; z-index: 3; }
.section {
  min-height: 100vh; padding: 100px 64px;
  max-width: 1440px; margin: 0 auto;
  display: flex; flex-direction: column; justify-content: center;
}
.section-tag {
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--secondary); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-tag::before {
  content: ''; display: inline-block; width: 20px; height: 1px;
  background: var(--secondary);
}
.glass {
  background: rgba(10,10,15,0.65);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  border: 1px solid rgba(0,229,255,0.08);
}
.glass-card {
  background: rgba(26,26,36,0.5);
  backdrop-filter: blur(16px) saturate(1.3);
  -webkit-backdrop-filter: blur(16px) saturate(1.3);
  border: 1px solid rgba(0,229,255,0.06);
  border-radius: 0;
  clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
  padding: 32px;
  transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}
.glass-card:hover {
  border-color: rgba(255,69,0,0.25);
  box-shadow: 0 0 30px rgba(255,69,0,0.1);
  transform: translateY(-2px);
}

/* Navbar */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(5,5,8,0.8);
  backdrop-filter: blur(24px) saturate(1.3);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  border-bottom: 1px solid rgba(0,229,255,0.06);
  padding: 14px 64px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo {
  font-family: var(--font-display); font-size: 22px;
  font-weight: 800; font-style: italic; text-transform: uppercase;
  letter-spacing: 3px; background: linear-gradient(135deg, #FF4500, #FF00FF);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.nav-logo::after {
  content: ''; display: block; width: 100%; height: 2px;
  background: linear-gradient(90deg, #FF4500, #00E5FF, #FF00FF);
  margin-top: -2px;
}
.nav-links { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
.nav-link {
  font-family: var(--font-body); font-size: 12px;
  text-transform: uppercase; letter-spacing: 2px;
  color: var(--on-surface-dim); text-decoration: none;
  transition: color 0.3s; cursor: pointer;
  background: none; border: none; position: relative;
}
.nav-link:hover { color: var(--secondary); }
.nav-link::after {
  content: ''; position: absolute; bottom: -4px; left: 0;
  width: 0; height: 1px; background: var(--secondary);
  transition: width 0.3s;
}
.nav-link:hover::after { width: 100%; }
.btn-play {
  padding: 10px 24px;
  background: linear-gradient(135deg, #FF4500, #FF00FF);
  border: none; color: white;
  font-family: var(--font-display); font-size: 12px;
  font-weight: 700; font-style: italic; text-transform: uppercase;
  letter-spacing: 2px;
  clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
  cursor: pointer; transition: all 0.3s;
  animation: pulse-neon 2s ease-in-out infinite;
}
.btn-play:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,69,0,0.5); }
@keyframes pulse-neon {
  0%, 100% { box-shadow: 0 0 10px rgba(255,69,0,0.3), 0 0 20px rgba(255,0,255,0.1); }
  50% { box-shadow: 0 0 25px rgba(255,69,0,0.5), 0 0 50px rgba(255,0,255,0.2); }
}

/* Hero */
.hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; min-height: 80vh; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--secondary);
  border: 1px solid rgba(0,229,255,0.2);
  padding: 5px 14px;
  clip-path: polygon(0 0, calc(100% - 5px) 0, 100% 5px, 100% 100%, 5px 100%, 0 calc(100% - 5px));
  margin-bottom: 20px;
}
.hero-badge::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--secondary); animation: pulse-dot 1.5s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.hero-headline {
  font-family: var(--font-display); font-size: 72px;
  font-weight: 800; font-style: italic; text-transform: uppercase;
  line-height: 0.95; margin-bottom: 20px;
  background: linear-gradient(180deg, #FFFFFF 30%, #FF4500 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 30px rgba(255,69,0,0.2));
}
.hero-headline .accent {
  background: linear-gradient(135deg, #00E5FF, #FF00FF);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-desc {
  font-size: 16px; line-height: 1.7;
  color: var(--on-surface-dim);
  margin-bottom: 28px; max-width: 480px;
}
.btn-group { display: flex; gap: 12px; margin-bottom: 48px; flex-wrap: wrap; }
.btn-download {
  padding: 14px 32px;
  background: linear-gradient(135deg, #FF4500, #cc3300);
  border: none; color: white;
  font-family: var(--font-display); font-size: 13px;
  font-weight: 700; font-style: italic; text-transform: uppercase;
  letter-spacing: 1px;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  cursor: pointer; transition: all 0.3s;
  text-decoration: none; display: inline-flex; align-items: center; gap: 10px;
  animation: pulse-dl 3s ease-in-out infinite;
}
.btn-download:hover { box-shadow: 0 0 40px rgba(255,69,0,0.5); transform: translateY(-2px); }
@keyframes pulse-dl { 0%,100% { box-shadow: 0 0 10px rgba(255,69,0,0.2); } 50% { box-shadow: 0 0 30px rgba(255,69,0,0.4); } }
.btn-outline {
  padding: 14px 32px;
  background: transparent;
  border: 1px solid rgba(0,229,255,0.3); color: var(--secondary);
  font-family: var(--font-display); font-size: 13px;
  font-weight: 700; font-style: italic; text-transform: uppercase;
  letter-spacing: 1px;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  cursor: pointer; transition: all 0.3s;
  text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
}
.btn-outline:hover { background: rgba(0,229,255,0.08); border-color: var(--secondary); box-shadow: 0 0 25px rgba(0,229,255,0.2); }
.hud-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 480px;
}
.hud-stat {
  padding: 16px 12px; text-align: center;
  background: rgba(0,229,255,0.03);
  border: 1px solid rgba(0,229,255,0.06);
  clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
}
.hud-stat .value {
  font-family: var(--font-mono); font-size: 26px;
  font-weight: 600; color: var(--primary);
  text-shadow: 0 0 10px rgba(255,69,0,0.3);
}
.hud-stat .label {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: 2px; color: var(--on-surface-dim);
  text-transform: uppercase; margin-top: 4px;
}
.hero-right {
  display: flex; flex-direction: column; align-items: flex-end; gap: 20px;
}
.hud-panel {
  padding: 20px 24px; width: 280px;
  border-left: 2px solid var(--secondary);
}
.hud-panel h4 {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: 3px; color: var(--secondary);
  margin-bottom: 12px; text-transform: uppercase;
}
.hud-panel-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(0,229,255,0.04); font-family: var(--font-mono); font-size: 11px; }
.hud-panel-row span:last-child { color: var(--secondary); }
.color-swatch {
  display: flex; gap: 8px; justify-content: center; margin-top: 12px;
}
.color-dot {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer; transition: all 0.3s;
}
.color-dot:hover, .color-dot.active { border-color: white; transform: scale(1.2); }

/* Platform Matrix */
.platform-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.platform-card {
  padding: 36px; position: relative; overflow: hidden;
  transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}
.platform-card::before {
  content: ''; position: absolute; inset: -1px;
  border-radius: inherit; padding: 1px;
  background: linear-gradient(135deg, transparent, transparent);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  transition: all 0.5s;
}
.platform-card:hover::before {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
}
.platform-card h3 {
  font-family: var(--font-display); font-size: 22px;
  font-weight: 700; font-style: italic; text-transform: uppercase;
  margin-bottom: 8px;
}
.platform-badge {
  display: inline-block;
  font-family: var(--font-mono); font-size: 9px;
  padding: 3px 10px;
  border: 1px solid rgba(0,229,255,0.2);
  color: var(--secondary); text-transform: uppercase;
  letter-spacing: 1px; margin-right: 6px; margin-bottom: 6px;
}
.platform-info {
  font-family: var(--font-mono); font-size: 12px;
  color: var(--on-surface-dim); line-height: 1.8;
  margin: 16px 0 24px;
}
.platform-btn {
  padding: 14px 28px; display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-display); font-size: 13px;
  font-weight: 700; font-style: italic; text-transform: uppercase;
  letter-spacing: 1px; cursor: pointer; transition: all 0.3s;
  text-decoration: none; color: white; border: none;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
}
.platform-btn.win { background: linear-gradient(135deg, #00E5FF, #0088CC); }
.platform-btn.win:hover { box-shadow: 0 0 30px rgba(0,229,255,0.5); }
.platform-btn.android { background: linear-gradient(135deg, #00FF88, #00AA55); }
.platform-btn.android:hover { box-shadow: 0 0 30px rgba(0,255,136,0.5); }

/* Vehicle cards */
.vehicle-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.vehicle-card { text-align: center; padding: 28px; }
.vehicle-card h3 { font-family: var(--font-display); font-size: 20px; font-weight: 700; font-style: italic; text-transform: uppercase; margin-bottom: 6px; }
.vehicle-class { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; color: var(--secondary); margin-bottom: 12px; }
.vehicle-stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 14px; }
.vehicle-stat { text-align: center; }
.vehicle-stat .value { font-family: var(--font-mono); font-size: 18px; font-weight: 600; color: var(--primary); }
.vehicle-stat .label { font-family: var(--font-mono); font-size: 9px; color: var(--on-surface-dim); text-transform: uppercase; letter-spacing: 1px; }
.grip-track { width: 100%; height: 3px; background: rgba(255,255,255,0.05); position: relative; margin-top: 6px; }
.grip-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: width 0.5s; }

/* Features bento */
.features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.feature-card { padding: 28px; position: relative; min-height: 160px; display: flex; flex-direction: column; justify-content: flex-end; }
.feature-card:nth-child(1) { grid-column: 1; grid-row: span 2; min-height: 340px; }
.feature-card:nth-child(4) { grid-column: 3; grid-row: span 2; min-height: 340px; }
.feature-num {
  font-family: var(--font-display); font-size: 42px; font-weight: 800; font-style: italic;
  position: absolute; top: 12px; right: 16px; line-height: 1;
  background: linear-gradient(135deg, #FF4500, #FF00FF);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  opacity: 0.5;
}
.feature-card h4 { font-family: var(--font-display); font-size: 16px; font-weight: 700; font-style: italic; text-transform: uppercase; margin-bottom: 6px; }
.feature-card p { font-size: 12px; line-height: 1.5; color: var(--on-surface-dim); }

/* Leaderboard */
.lb-wrap { overflow-x: auto; padding: 20px; }
.lb-table { width: 100%; border-collapse: collapse; }
.lb-table th {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--on-surface-dim);
  padding: 12px 10px; text-align: left;
  border-bottom: 1px solid rgba(0,229,255,0.06);
}
.lb-table td {
  padding: 12px 10px; font-family: var(--font-mono); font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.02);
}
.lb-table tr:hover td { background: rgba(255,69,0,0.03); }
.rank-gold td:first-child { color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.4); }
.rank-cyan td:first-child { color: #00E5FF; }
.rank-orange td:first-child { color: #FF4500; }

/* Footer */
.footer {
  padding: 80px 64px 40px; text-align: center;
  border-top: 1px solid rgba(0,229,255,0.04);
}
.footer h2 {
  font-family: var(--font-display); font-size: 32px;
  font-weight: 800; font-style: italic; text-transform: uppercase;
  margin-bottom: 12px;
}
.footer p { color: var(--on-surface-dim); margin-bottom: 28px; font-size: 15px; }
.footer-socials { display: flex; gap: 24px; justify-content: center; margin-top: 32px; }
.footer-socials a {
  color: var(--on-surface-dim); text-decoration: none;
  font-family: var(--font-mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 2px;
  transition: color 0.3s;
}
.footer-socials a:hover { color: var(--secondary); }

/* Stitch Panel */
/* Download Modal */
.dl-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(5,5,8,0.92);
  backdrop-filter: blur(30px) saturate(1.5);
  -webkit-backdrop-filter: blur(30px) saturate(1.5);
  display: flex; align-items: center; justify-content: center;
  animation: dl-fade 0.3s ease;
}
@keyframes dl-fade { from { opacity: 0; } to { opacity: 1; } }
.dl-modal {
  width: 720px; max-width: 94vw; max-height: 90vh;
  overflow-y: auto; padding: 40px;
  background: rgba(10,10,18,0.85);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(0,229,255,0.1);
  clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
  animation: dl-slide 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}
@keyframes dl-slide { from { opacity: 0; transform: translateY(30px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.dl-close {
  position: absolute; top: 16px; right: 20px;
  background: none; border: none; color: var(--on-surface-dim);
  font-size: 24px; cursor: pointer; font-family: var(--font-mono);
  transition: color 0.2s;
}
.dl-close:hover { color: var(--primary); }
.dl-header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
.dl-icon {
  width: 56px; height: 56px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.dl-icon.win { background: linear-gradient(135deg, #00E5FF33, #0088CC22); border: 1px solid rgba(0,229,255,0.2); }
.dl-icon.android { background: linear-gradient(135deg, #00FF8833, #00AA5522); border: 1px solid rgba(0,255,136,0.2); }
.dl-header h2 {
  font-family: var(--font-display); font-size: 26px;
  font-weight: 800; font-style: italic; text-transform: uppercase;
}
.dl-header .sub {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--on-surface-dim); letter-spacing: 1px;
}
.dl-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.dl-meta-item {
  padding: 12px 16px;
  background: rgba(0,229,255,0.03);
  border: 1px solid rgba(0,229,255,0.06);
  clip-path: polygon(0 0, calc(100% - 5px) 0, 100% 5px, 100% 100%, 5px 100%, 0 calc(100% - 5px));
}
.dl-meta-item .lbl { font-family: var(--font-mono); font-size: 8px; letter-spacing: 2px; color: var(--on-surface-dim); text-transform: uppercase; }
.dl-meta-item .val { font-family: var(--font-mono); font-size: 14px; color: var(--secondary); margin-top: 4px; }
.dl-reqs {
  margin-bottom: 24px; padding: 20px;
  background: rgba(255,69,0,0.03);
  border: 1px solid rgba(255,69,0,0.08);

  <div class="wheel-wrap" id="wheelWrap">

      <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,69,0,0.15)" stroke-width="5" stroke-dasharray="4 4" />
      <!-- Rim -->

      <!-- Spokes -->

      <line x1="29" y1="29" x2="71" y2="71" stroke="rgba(255,69,0,0.07)" stroke-width="1.5" />

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;
const { createRoot } = ReactDOM;

// --- Download URLs ---
const DL_WIN = 'https://drive.usercontent.google.com/download?id=14FnfGVAJGNkQe7_pH2p6hEAxJ1D7GPOq&export=download&authuser=0';
const DL_ANDROID = 'https://drive.usercontent.google.com/download?id=1l-BNfe9NIriYtJLme5ehz1q0GvWvcbzG&export=download&authuser=0';

// --- Zustand store ---
const useStore = (() => {
  const state = { scroll: 0, hoverPlatform: null, carColor: '#FF4500', stitchSession: null, stitchResult: '' };
  const listeners = new Set();
  return (selector) => {
    const [, force] = useState(0);
    useEffect(() => {
      const fn = () => force(n => n + 1);
      listeners.add(fn);
      return () => listeners.delete(fn);
    }, []);
    const get = () => state;
    const set = (partial) => {
      const next = typeof partial === 'function' ? partial(state) : partial;
      Object.assign(state, next);
      listeners.forEach(l => l());
    };
    return { get, set, state };
  };
})();

// --- Loading ---
function Loading({ onDone }) {
  useEffect(() => {
    let p = 0;
    const progress = document.getElementById('wheelProgress');
    const txt = document.getElementById('wtext');
    const svg = document.querySelector('.wheel-svg');
    const iv = setInterval(() => {
      p += Math.random() * 6 + 3;
      if (p >= 100) { p = 100; clearInterval(iv); setTimeout(() => { document.getElementById('loading-screen').classList.add('hidden'); onDone(); }, 500); }
      if (progress) progress.style.height = p + '%';
      if (txt) txt.textContent = Math.floor(p) + '%';
      if (svg) svg.style.animationDuration = Math.max(0.3, 1.2 - p * 0.009) + 's';
    }, 120);
    return () => clearInterval(iv);
  }, [onDone]);
  return null;
}

// --- Three.js Scene ---
function Scene3D({ store }) {
  const ref = useRef(null);
  const blurRef = useRef(null);
  const sceneData = useRef(null);
  const animRef = useRef(null);

  useEffect(() => {
    const el = ref.current;
    if (!el) return;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050508, 0.012);

    const cam = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    el.appendChild(renderer.domElement);

    // Lights
    const ambient = new THREE.AmbientLight(0x111133, 0.3);
    scene.add(ambient);
    const hemi = new THREE.HemisphereLight(0x2233aa, 0x111122, 0.4);
    scene.add(hemi);

    const keyLight = new THREE.DirectionalLight('#FF6633', 0.7);
    keyLight.position.set(6, 10, 6);
    keyLight.castShadow = true;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight('#3366FF', 0.4);
    fillLight.position.set(-6, 4, -8);
    scene.add(fillLight);

    // Neon accent lights (will be toggled by platform hover)
    const neonLights = [
      new THREE.PointLight('#FF4500', 0.8, 12),
      new THREE.PointLight('#00E5FF', 0.8, 12),
      new THREE.PointLight('#FF00FF', 0.8, 12),
      new THREE.PointLight('#00FF88', 0.8, 12),
    ];
    neonLights.forEach((l, i) => {
      const a = (i / neonLights.length) * Math.PI * 2;
      l.position.set(Math.cos(a) * 4, 1.8, Math.sin(a) * 4);
      scene.add(l);
    });

    // Platform hover lights
    const platformLight = new THREE.PointLight('#00E5FF', 0, 20);
    platformLight.position.set(0, 3, 0);
    scene.add(platformLight);

    // --- ASPHALT ---
    const c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    const cx = c.getContext('2d');
    cx.fillStyle = '#111114'; cx.fillRect(0, 0, 512, 512);
    for (let i = 0; i < 10000; i++) {
      const g = 16 + Math.random() * 28;
      cx.fillStyle = `rgb(${g},${g},${g+2})`;
      cx.fillRect(Math.random() * 512, Math.random() * 512, 1 + Math.random() * 2, 1 + Math.random() * 2);
    }
    // Road lines
    cx.strokeStyle = 'rgba(255,69,0,0.5)'; cx.lineWidth = 3; cx.setLineDash([20, 25]);
    for (let y = 0; y < 512; y += 20) { cx.beginPath(); cx.moveTo(240, y); cx.lineTo(272, y); cx.stroke(); }
    cx.strokeStyle = 'rgba(0,229,255,0.2)'; cx.lineWidth = 1; cx.setLineDash([8, 20]);
    for (let y = 0; y < 512; y += 8) { cx.beginPath(); cx.moveTo(195, y); cx.lineTo(210, y); cx.stroke(); cx.beginPath(); cx.moveTo(302, y); cx.lineTo(317, y); cx.stroke(); }
    const atex = new THREE.CanvasTexture(c);
    atex.wrapS = atex.wrapT = THREE.RepeatWrapping; atex.repeat.set(15, 15);
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(100, 100),
      new THREE.MeshStandardMaterial({ map: atex, roughness: 0.95, metalness: 0.02, color: 0x181820 })
    );
    ground.rotation.x = -Math.PI / 2; ground.position.y = -1.5; ground.receiveShadow = true;
    scene.add(ground);

    // Wet reflection
    const wet = new THREE.Mesh(
      new THREE.PlaneGeometry(100, 100),
      new THREE.MeshStandardMaterial({ color: 0x080810, transparent: true, opacity: 0.12, roughness: 0.05, metalness: 0.4 })
    );
    wet.rotation.x = -Math.PI / 2; wet.position.y = -1.48;
    scene.add(wet);

    // --- NEON BILLBOARDS (holographic signs) ---
    function createBillboard(text, x, y, z, color, rotY) {
      const g = new THREE.Group();
      // Main frame
      const frameMat = new THREE.MeshBasicMaterial({ color: 0x111122, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
      const frame = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.8), frameMat);
      g.add(frame);
      // Neon border
      const borderMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
      const border = new THREE.Mesh(new THREE.EdgesGeometry(new THREE.PlaneGeometry(1.6, 0.8)), borderMat);
      g.add(border);
      // Glow core
      const glowMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.08, side: THREE.DoubleSide });
      const glow = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 1.0), glowMat);
      g.add(glow);
      g.position.set(x, y, z);
      g.rotation.y = rotY || 0;
      g.userData = { pulseSpeed: 0.5 + Math.random() * 0.5 };
      return g;
    }

    const billboardData = [
      ['NEO-KYOTO SIM', '#FF00FF'], ['TURBO RACER', '#FF4500'], ['SIM PROTOCOL', '#00E5FF'],
      ['TELEMETRY LIVE', '#00FF88'], ['RANKED S01', '#FFD700'], ['DRIFT ARENA', '#FF00FF'],
    ];
    billboardData.forEach(([txt, col], i) => {
      const a = (i / billboardData.length) * Math.PI * 2 + 0.2;
      const dist = 12 + Math.random() * 6;
      const bb = createBillboard(txt, Math.cos(a) * dist, 2 + Math.random() * 3, Math.sin(a) * dist, col, -a);
      scene.add(bb);
    });

    // --- SKYSCRAPERS ---
    const buildings = [];
    const bColors = [0x0a0a18, 0x0e0e22, 0x080812, 0x121230, 0x060610];
    const winColors = [0xFF4500, 0x00E5FF, 0xFF00FF, 0x00FF88, 0xFFD700, 0xFFFFFF];
    function addBuilding(w, h, d, x, z) {
      const mat = new THREE.MeshStandardMaterial({
        color: bColors[Math.floor(Math.random() * bColors.length)],
        metalness: 0.6, roughness: 0.4,
      });
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
      m.position.set(x, h / 2 - 1.5, z);
      m.castShadow = true;
      scene.add(m);
      buildings.push(m);

      const winGroup = new THREE.Group();
      const rows = Math.floor(h / 0.5), cols = Math.floor(w / 0.35);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (Math.random() > 0.3) {
            const wm = new THREE.MeshBasicMaterial({
              color: winColors[Math.floor(Math.random() * winColors.length)],
              transparent: true, opacity: 0.2 + Math.random() * 0.5,
            });
            const win = new THREE.Mesh(new THREE.PlaneGeometry(0.12, 0.2), wm);
            win.position.set(-w / 2 + 0.15 + c * 0.35, -h / 2 + 0.25 + r * 0.5, d / 2 + 0.01);
            winGroup.add(win);
          }
        }
      }
      winGroup.position.set(x, h / 2 - 1.5, z);
      scene.add(winGroup);
      buildings.push(winGroup);

      if (h > 5 && Math.random() > 0.6) {
        const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.03, 0.5, 4),
          new THREE.MeshBasicMaterial({ color: 0xFF4500 }));
        ant.position.set(x, h - 1.5 + 0.25, z);
        scene.add(ant);
      }
    }

    for (let i = 0; i < 40; i++) {
      const a = Math.random() * Math.PI * 2;
      const d = 10 + Math.random() * 22;
      addBuilding(0.5 + Math.random() * 1.4, 1.5 + Math.random() * 12, 0.5 + Math.random() * 1.4,
        Math.cos(a) * d, Math.sin(a) * d);
    }

    // --- CAR (photorealistic gloss) ---
    const car = new THREE.Group();

    // Paint texture (metallic flake)
    const pt = document.createElement('canvas'); pt.width = 256; pt.height = 256;
    const pctx = pt.getContext('2d');
    pctx.fillStyle = '#0a0a10'; pctx.fillRect(0, 0, 256, 256);
    for (let i = 0; i < 800; i++) {
      const v = 10 + Math.random() * 25;
      pctx.fillStyle = `rgba(${v},${v},${v+3},0.2)`;
      pctx.fillRect(Math.random() * 256, Math.random() * 256, 2 + Math.random() * 3, 2 + Math.random() * 3);
    }
    const paintTex = new THREE.CanvasTexture(pt);

    // Carbon fiber
    const ct = document.createElement('canvas'); ct.width = 256; ct.height = 256;
    const cctx = ct.getContext('2d');
    cctx.fillStyle = '#080808'; cctx.fillRect(0, 0, 256, 256);
    for (let i = 0; i < 3000; i++) {
      const g = 6 + Math.random() * 12;
      cctx.fillStyle = `rgb(${g},${g},${g})`;
      cctx.fillRect(Math.random() * 256, Math.random() * 256, 1 + Math.random() * 2, 1 + Math.random() * 2);
    }
    cctx.strokeStyle = 'rgba(255,255,255,0.02)';
    for (let i = -50; i < 300; i += 6) { cctx.beginPath(); cctx.moveTo(i, 0); cctx.lineTo(i - 40, 256); cctx.stroke(); }
    const cfTex = new THREE.CanvasTexture(ct);

    // Body
    const bodyMat = new THREE.MeshStandardMaterial({
      map: paintTex, color: 0xFF4500, metalness: 0.8, roughness: 0.12, envMapIntensity: 1.5,
    });
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.32, 3.2), bodyMat);
    body.position.y = 0.2; body.castShadow = true;
    car.add(body);

    // Side skirts
    const skirtMat = new THREE.MeshStandardMaterial({ color: 0xcc3300, metalness: 0.85, roughness: 0.15 });
    for (let s of [-1, 1]) {
      const sk = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.15, 2.6), skirtMat);
      sk.position.set(s * 0.82, 0.15, 0);
      car.add(sk);
    }

    // Hood (carbon fiber)
    const hoodMat = new THREE.MeshStandardMaterial({ map: cfTex, color: 0x222222, metalness: 0.9, roughness: 0.12 });
    const hood = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.02, 1.1), hoodMat);
    hood.position.set(0, 0.36, 0.9);
    car.add(hood);

    // Cabin
    const cabinMat = new THREE.MeshStandardMaterial({ color: 0x080810, metalness: 0.95, roughness: 0.04, envMapIntensity: 0.6 });
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.22, 1.25), cabinMat);
    cabin.position.set(0, 0.46, -0.3);
    car.add(cabin);

    // Windshield
    const glassMat = new THREE.MeshStandardMaterial({
      color: 0x88DDFF, transparent: true, opacity: 0.15, metalness: 0.05, roughness: 0.0, envMapIntensity: 0.3,
    });
    const ws = new THREE.Mesh(new THREE.PlaneGeometry(0.95, 0.2), glassMat);
    ws.position.set(0, 0.47, 0.36); ws.rotation.x = -0.2;
    car.add(ws);

    // Neon stripe
    const nstripe = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.005, 3.2),
      new THREE.MeshBasicMaterial({ color: '#FF4500' }));
    nstripe.position.set(0.65, 0.37, 0);
    car.add(nstripe);
    const nstripe2 = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.005, 3.2),
      new THREE.MeshBasicMaterial({ color: '#00E5FF' }));
    nstripe2.position.set(-0.65, 0.37, 0);
    car.add(nstripe2);

    // Center stripe
    const cstrip = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.005, 2.8),
      new THREE.MeshBasicMaterial({ color: '#FFFFFF', transparent: true, opacity: 0.15 }));
    cstrip.position.set(0, 0.37, 0);
    car.add(cstrip);

    // Headlights
    const hlMat = new THREE.MeshStandardMaterial({ color: 0xFF8833, emissive: 0xFF4400, emissiveIntensity: 0.6 });
    for (let s of [-0.4, 0.4]) {
      const hl = new THREE.Mesh(new THREE.SphereGeometry(0.07, 12, 12), hlMat);
      hl.position.set(s, 0.18, 1.65);
      car.add(hl);
    }

    // Tail lights
    const tlMat = new THREE.MeshBasicMaterial({ color: '#FF0044', transparent: true, opacity: 0.8 });
    for (let s of [-0.5, 0.5]) {
      const tl = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.03, 0.03), tlMat);
      tl.position.set(s, 0.14, -1.65);
      car.add(tl);
    }

    // Wheels
    const wheelMat2 = new THREE.MeshStandardMaterial({ color: 0x080808, metalness: 0.9, roughness: 0.3 });
    const rimMat2 = new THREE.MeshStandardMaterial({ color: 0xCCCCCC, metalness: 0.95, roughness: 0.05 });
    const calMat = new THREE.MeshBasicMaterial({ color: '#FF4500' });
    for (let wp of [[-0.76, 0.08, 1.1], [0.76, 0.08, 1.1], [-0.76, 0.08, -1.1], [0.76, 0.08, -1.1]]) {
      const wh = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.1, 24), wheelMat2);
      wh.rotation.x = Math.PI / 2; wh.position.set(wp[0], wp[1], wp[2]);
      car.add(wh);
      const rim2 = new THREE.Mesh(new THREE.TorusGeometry(0.13, 0.02, 8, 12), rimMat2);
      rim2.position.set(wp[0], wp[1], wp[2]); rim2.rotation.x = Math.PI / 2;
      car.add(rim2);
      const cal = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.03, 0.03), calMat);
      cal.position.set(wp[0] + 0.04, wp[1] - 0.04, wp[2]);
      car.add(cal);
    }

    // Spoiler (carbon)
    const spMat = new THREE.MeshStandardMaterial({ map: cfTex, color: 0x1a1a1a, metalness: 0.85, roughness: 0.12 });
    const sp = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.015, 0.3), spMat);
    sp.position.set(0, 0.6, -1.7);
    car.add(sp);
    for (let s of [-0.45, 0.45]) {
      const leg = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.2, 0.03), spMat);
      leg.position.set(s, 0.46, -1.7);
      car.add(leg);
    }

    // Underglow
    const uGlow = new THREE.Mesh(new THREE.PlaneGeometry(1.3, 2.6),
      new THREE.MeshBasicMaterial({ color: '#FF4500', transparent: true, opacity: 0.2, side: THREE.DoubleSide }));
    uGlow.position.set(0, 0.01, 0); uGlow.rotation.x = -Math.PI / 2;
    car.add(uGlow);

    // Headlight beams
    const beamMat = new THREE.MeshBasicMaterial({ color: 0xFF6622, transparent: true, opacity: 0.06, side: THREE.DoubleSide, depthWrite: false });
    for (let s of [-0.35, 0.35]) {
      const bm = new THREE.Mesh(new THREE.ConeGeometry(0.05, 2.0, 6), beamMat);
      bm.position.set(s, 0.18, 1.6);
      car.add(bm);
      const bm2 = new THREE.Mesh(new THREE.ConeGeometry(0.12, 1.8, 6), beamMat.clone());
      bm2.material.opacity = 0.03;
      bm2.position.set(s, 0.14, 1.5);
      car.add(bm2);
    }

    car.position.set(0, 0.5, 3);
    scene.add(car);

    // --- DRIFT SMOKE ---
    const smokeCount = 120;
    const smokeGeo = new THREE.BufferGeometry();
    const smokePos = new Float32Array(smokeCount * 3);
    const smokeSizes = new Float32Array(smokeCount);
    for (let i = 0; i < smokeCount; i++) {
      smokePos[i * 3] = (Math.random() - 0.5) * 2;
      smokePos[i * 3 + 1] = -0.8;
      smokePos[i * 3 + 2] = (Math.random() - 0.5) * 3 - 1.5;
      smokeSizes[i] = 0.05 + Math.random() * 0.15;
    }
    smokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePos, 3));
    smokeGeo.setAttribute('size', new THREE.BufferAttribute(smokeSizes, 1));
    const smokeMat = new THREE.PointsMaterial({
      color: 0x888899, size: 0.08, transparent: true, opacity: 0.08,
      blending: THREE.AdditiveBlending, depthWrite: false,
      sizeAttenuation: true,
    });
    const smoke = new THREE.Points(smokeGeo, smokeMat);
    scene.add(smoke);

    // --- RAIN ---
    const rainCount = 2000;
    const rainGeo2 = new THREE.BufferGeometry();
    const rainPos2 = new Float32Array(rainCount * 3);
    const rainVel2 = new Float32Array(rainCount);
    for (let i = 0; i < rainCount; i++) {
      rainPos2[i * 3] = (Math.random() - 0.5) * 60;
      rainPos2[i * 3 + 1] = Math.random() * 20 - 2;
      rainPos2[i * 3 + 2] = (Math.random() - 0.5) * 60 - 5;
      rainVel2[i] = 0.04 + Math.random() * 0.08;
    }
    rainGeo2.setAttribute('position', new THREE.BufferAttribute(rainPos2, 3));
    const rainMat2 = new THREE.PointsMaterial({
      color: 0x88BBFF, size: 0.035, transparent: true, opacity: 0.2,
    });
    const rainPts = new THREE.Points(rainGeo2, rainMat2);
    scene.add(rainPts);

    // --- GEOMETRIC ORBS ---
    const orbs = [];
    const orbCols = [0xFF4500, 0x00E5FF, 0xFF00FF, 0x00FF88];
    for (let i = 0; i < 50; i++) {
      const mat = new THREE.MeshStandardMaterial({
        color: orbCols[Math.floor(Math.random() * orbCols.length)],
        emissive: orbCols[Math.floor(Math.random() * orbCols.length)],
        emissiveIntensity: 0.2, metalness: 0.7, roughness: 0.2,
        transparent: true, opacity: 0.2 + Math.random() * 0.4,
      });
      const geo = [new THREE.OctahedronGeometry(0.035), new THREE.TetrahedronGeometry(0.04),
                   new THREE.IcosahedronGeometry(0.03)][Math.floor(Math.random() * 3)];
      const m = new THREE.Mesh(geo, mat);
      m.position.set((Math.random() - 0.5) * 14, Math.random() * 5 - 1, (Math.random() - 0.5) * 18 - 3);
      m.userData = {
        r: { x: (Math.random() - 0.5) * 2, y: (Math.random() - 0.5) * 2, z: (Math.random() - 0.5) * 2 },
        fs: 0.1 + Math.random() * 0.4, fa: 0.1 + Math.random() * 0.3, ph: Math.random() * Math.PI * 2,
      };
      scene.add(m);
      orbs.push(m);
    }

    sceneData.current = {
      scene, cam, renderer, car, neonLights, platformLight, rainPts, rainVel2, rainCount,
      smoke, smokePos, smokeCount, orbs, buildings, blurRef,
    };

    cam.position.set(0, 3.5, 8); cam.lookAt(0, 0, 0);

    const resize = () => {
      cam.aspect = window.innerWidth / window.innerHeight;
      cam.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    };
    window.addEventListener('resize', resize);

    let running = true;
    const clock = new THREE.Clock();
    function animate() {
      if (!running) return;
      animRef.current = requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Rain
      const rp = rainPts.geometry.attributes.position.array;
      for (let i = 0; i < rainCount; i++) {
        rp[i * 3 + 1] -= rainVel2[i];
        rp[i * 3] += Math.sin(t + i) * 0.0015;
        if (rp[i * 3 + 1] < -2) {
          rp[i * 3 + 1] = 18; rp[i * 3] = (Math.random() - 0.5) * 60;
          rp[i * 3 + 2] = (Math.random() - 0.5) * 60 - 5;
        }
      }
      rainPts.geometry.attributes.position.needsUpdate = true;

      // Smoke
      const sp = smoke.geometry.attributes.position.array;
      for (let i = 0; i < smokeCount; i++) {
        sp[i * 3] += Math.sin(t * 0.5 + i) * 0.002;
        sp[i * 3 + 1] += 0.003;
        sp[i * 3 + 2] -= 0.001;
        if (sp[i * 3 + 1] > 0.5) { sp[i * 3 + 1] = -0.8; sp[i * 3] = (Math.random() - 0.5) * 2; sp[i * 3 + 2] = (Math.random() - 0.5) * 3 - 1.5; }
      }
      smoke.geometry.attributes.position.needsUpdate = true;

      // Orbs
      orbs.forEach((o, i) => {
        o.rotation.x += o.userData.r.x * 0.008;
        o.rotation.y += o.userData.r.y * 0.008;
        o.position.y += Math.sin(t * o.userData.fs + o.userData.ph) * 0.002;
        o.position.x += Math.sin(t * 0.08 + i) * 0.0008;
        o.position.z += Math.cos(t * 0.08 + i) * 0.0008;
      });

      // Neon light orbit
      neonLights.forEach((l, i) => {
        const p = Math.sin(t * 0.4 + i * 1.2) * 0.3 + 0.7;
        l.intensity = p * 0.8;
        const a = t * 0.15 + (i / neonLights.length) * Math.PI * 2;
        l.position.x = Math.cos(a) * 4;
        l.position.z = Math.sin(a) * 4;
        l.position.y = 1.5 + Math.sin(t * 0.3 + i) * 0.5;
      });

      // Billboard pulse
      scene.children.forEach(c => {
        if (c.userData && c.userData.pulseSpeed) {
          const p2 = Math.sin(t * c.userData.pulseSpeed) * 0.15 + 0.85;
          c.children[0].material.opacity = p2 * 0.3;
        }
      });

      // Building window pulse
      buildings.forEach(b => {
        if (b.type === 'Group') {
          b.children.forEach(win => {
            if (win.material && win.material.opacity !== undefined) {
              win.material.opacity = 0.15 + Math.sin(t * 0.5 + b.id + win.id) * 0.1 + 0.25;
            }
          });
        }
      });

      // Headlight pulse
      const hp = Math.sin(t * 2.5) * 0.15 + 0.85;
      car.children.forEach(c => {
        if (c.material && c.material.emissive && c.geometry?.type === 'SphereGeometry') {
          c.material.emissiveIntensity = hp * 0.7;
        }
      });

      // Street lights pulse
      const slp = Math.sin(t * 3) * 0.2 + 0.8;
      car.children.forEach(c => {
        if (c.material && c.material.color && c.position.z < -1.6 && c.position.z > -1.7) {
          c.material.opacity = slp;
        }
      });

      renderer.render(scene, cam);
    }
    animate();

    return () => {
      running = false;
      cancelAnimationFrame(animRef.current);
      window.removeEventListener('resize', resize);
      if (el.contains(renderer.domElement)) el.removeChild(renderer.domElement);
      renderer.dispose();
    };
  }, []);

  // Scroll-driven camera + platform hover lighting
  useEffect(() => {
    const sd = sceneData.current;
    if (!sd) return;
    const { store: _s } = {};
    const unsub = () => {};

    const interval = setInterval(() => {
      const sd2 = sceneData.current;
      if (!sd2) return;
      const { cam, car, platformLight, neonLights, orbs } = sd2;

      // Read state
      const p = useStore ? (typeof useStore === 'function' ? 0 : 0) : 0;
      // Use closure access to store
      const scrollVal = window._turboScroll || 0;
      const hoverPlat = window._turboHover || null;

      const s = scrollVal;
      const camPoses = [
        { pos: [0, 3.5, 8], target: [0, 0, 0], fov: 55 },
        { pos: [0, 2.5, 6], target: [0, 0.3, 0], fov: 53 },
        { pos: [3.2, 2.0, 4.5], target: [0, 0.5, 0], fov: 50 },
        { pos: [0, 1.0, 2.5], target: [0, 0.3, 0.2], fov: 58 },
        { pos: [4.5, 5.5, 4.5], target: [0, 0, 0], fov: 45 },
        { pos: [0, 8.5, 11], target: [0, -2.5, -7], fov: 48 },
      ];

      const idx = Math.min(Math.floor(s * camPoses.length), camPoses.length - 1);
      const nidx = Math.min(idx + 1, camPoses.length - 1);
      const f = (s * camPoses.length) % 1;
      const sf = f * f * (3 - 2 * f);
      const cur = camPoses[idx], next = camPoses[nidx];
      const lerp3 = (a, b, t) => a + (b - a) * t;

      cam.position.x = lerp3(cur.pos[0], next.pos[0], sf);
      cam.position.y = lerp3(cur.pos[1], next.pos[1], sf);
      cam.position.z = lerp3(cur.pos[2], next.pos[2], sf);
      cam.fov = lerp3(cur.fov, next.fov, sf);
      cam.updateProjectionMatrix();
      cam.lookAt(lerp3(cur.target[0], next.target[0], sf),
        lerp3(cur.target[1], next.target[1], sf),
        lerp3(cur.target[2], next.target[2], sf));

      car.position.z = 3 - s * 9;
      car.rotation.y = s * Math.PI * 0.35;
      car.rotation.x = Math.sin(s * Math.PI) * 0.03;

      // Wheel spin
      car.children.forEach(c2 => {
        if (c2.geometry && (c2.geometry.type === 'CylinderGeometry' || c2.geometry.type === 'TorusGeometry') && Math.abs(c2.position.z) > 0.5) {
          c2.rotation.z += 0.06;
        }
      });

      // Platform hover lighting
      if (hoverPlat === 'win') {
        platformLight.color.setHex(0x00E5FF);
        platformLight.intensity = 1.5;
        neonLights[1].intensity = 2.0;
      } else if (hoverPlat === 'android') {
        platformLight.color.setHex(0x00FF88);
        platformLight.intensity = 1.5;
        neonLights[3].intensity = 2.0;
      } else {
        platformLight.intensity = lerp3(platformLight.intensity, 0, 0.05);
        neonLights.forEach((l, i) => { if (i !== 1 && i !== 3) l.intensity = lerp3(l.intensity, 0.8, 0.05); });
      }

      // Orbs respond to scroll
      orbs.forEach((o, i) => {
        const spread = 2 + s * 7;
        o.position.y += 0.001;
      });

      // DOF
      const dof = document.querySelector('.dof-overlay');
      if (dof) {
        dof.style.backdropFilter = `blur(${Math.min(s * 1.5, 1.8)}px)`;
      }
    }, 50);

    return () => clearInterval(interval);
  }, []);

  return (
    <>
      <div ref={ref} className="canvas-wrap" />
      <div className="dof-overlay" />
    </>
  );
}

// --- Zustand hook for React components ---
function useTurboStore(selector) {
  const [, force] = useState(0);
  useEffect(() => {
    const check = () => force(n => n + 1);
    const iv = setInterval(check, 100);
    return () => clearInterval(iv);
  }, []);
  const val = selector ? selector(window._turboState || {}) : (window._turboState || {});
  return val;
}

function StitchPanel() {
  const [open, setOpen] = useState(false);

        method: 'POST',
        headers: { 'Accept': 'application/json', 'X-Goog-Api-Key': 'YOUR_STITCH_API_KEY', 'Content-Type': 'application/json' },
        body: JSON.stringify({ jsonrpc: '2.0', id: Date.now(), method: 'tools/call', params: { name: tool, arguments: args } }),

      const data = await res.json();
      setResult(JSON.stringify(data, null, 2));
    } catch (e) { setResult('Error: ' + e.message); }

  return (
    <div className="stitch-fab">

function DownloadModal({ platform, onClose }) {
  const info = DL_META[platform];
  const [phase, setPhase] = useState('ready'); // ready, preparing, downloading, done
  const [progress, setProgress] = useState(0);
  const [status, setStatus] = useState('');

  const startDownload = () => {
    setPhase('preparing');
    setStatus('Securing download channel...');
    setTimeout(() => {
      setPhase('downloading');
      setStatus('Connecting to Google Drive CDN...');
      let p = 0;
      const iv = setInterval(() => {
        p += Math.random() * 6 + 2;
        if (p >= 100) {
          p = 100;
          clearInterval(iv);
          setPhase('done');
          setStatus('Download started! Check your browser downloads.');
          window.open(info.url, '_blank', 'noopener,noreferrer');
        }
        setProgress(p);
        const dots = '.'.repeat(Math.floor(p / 10) % 4);
        if (p < 30) setStatus(`Allocating storage${dots}`);
        else if (p < 60) setStatus(`Verifying integrity${dots}`);
        else if (p < 90) setStatus(`Finalizing package${dots}`);
        else setStatus('Launching download...');
      }, 120);
    }, 800);
  };

  const isWin = platform === 'win';

  return (
    <div className="dl-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="dl-modal" style={{ position: 'relative' }}>
        <button className="dl-close" onClick={onClose}>&times;</button>

        <div className="dl-header">
          <div className={`dl-icon ${platform}`}>{info.icon}</div>
          <div>
            <h2>{info.title}</h2>
            <div className="sub">{info.subtitle}</div>
          </div>
        </div>

        <div className="dl-meta">
          {info.meta.map((m, i) => (
            <div key={i} className="dl-meta-item">
              <div className="lbl">{m.label}</div>
              <div className="val">{m.val}</div>
            </div>
          ))}
        </div>

        <div className="dl-reqs">
          <h4>System Requirements</h4>
          <ul>
            {info.reqs.map((r, i) => <li key={i}>{r}</li>)}
          </ul>
        </div>

        <div className="dl-reqs" style={{ borderColor: 'rgba(0,229,255,0.06)', background: 'rgba(0,229,255,0.02)' }}>
          <h4 style={{ color: 'var(--secondary)' }}>Key Features</h4>
          <ul>
            {info.features.map((f, i) => <li key={i} style={{ color: 'var(--on-surface-dim)' }}>{f}</li>)}
          </ul>
        </div>

        {phase === 'ready' && (
          <button className={`dl-btn-big ${platform}`} onClick={startDownload}>
            {info.icon} Start Download
          </button>
        )}

        {phase === 'preparing' && (
          <button className={`dl-btn-big ${platform}`} disabled>
            <span style={{ display: 'inline-block', animation: 'pulse-neon 0.8s infinite' }}>&#x25B6;</span> Preparing...
          </button>
        )}

        {phase === 'downloading' && (
          <>
            <button className={`dl-btn-big ${platform}`} disabled>
              Downloading {Math.floor(progress)}%
            </button>
            <div className="dl-progress">
              <div className="dl-progress-bar" style={{ width: progress + '%' }} />
            </div>
            <div className="dl-progress-label">{status}</div>
          </>
        )}

        {phase === 'done' && (
          <>
            <button className={`dl-btn-big ${platform}`} onClick={() => window.open(info.url, '_blank')}>
              {info.icon} Download Again
            </button>
            <div className="dl-progress-label" style={{ color: 'var(--green)' }}>
              &#x2713; Your download should begin shortly
            </div>
          </>
        )}

        <div className="dl-note">
          Google Drive may show a virus scan warning &mdash; this is normal for APK/executable files. Click "Download Anyway".
        </div>
      </div>
    </div>
  );
}

// --- App ---
function App() {
  const [loaded, setLoaded] = useState(false);
  const [downloadPlatform, setDownloadPlatform] = useState(null);

  // Scroll tracker
  useEffect(() => {
    if (!loaded) return;
    const handler = () => {
      const s = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
      window._turboScroll = Math.min(s, 0.99);
      window._turboState.scroll = window._turboScroll;
    };
    window.addEventListener('scroll', handler, { passive: true });
    return () => window.removeEventListener('scroll', handler);
  }, [loaded]);

  const openDownload = (platform) => {
    window._turboHover = platform;
    window._turboState.hoverPlatform = platform;
    setDownloadPlatform(platform);
  };

  if (!loaded) return <Loading onDone={() => setLoaded(true)} />;

  return (
    <>
      <Scene3D />
      <div className="content">
        <Navbar onOpenDownload={openDownload} />
        <HeroSection onOpenDownload={openDownload} />
        <TrailerSection />
        <PlatformMatrix onOpenDownload={openDownload} />
        <VehicleShowroom />
        <ModesSection />
        <FeaturesGrid />
        <Leaderboard />
        <Footer onOpenDownload={openDownload} />
      </div>
      <StitchPanel />
      {downloadPlatform && (
        <DownloadModal platform={downloadPlatform} onClose={() => { setDownloadPlatform(null); window._turboHover = null; window._turboState.hoverPlatform = null; }} />
      )}
    </>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);
